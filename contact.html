    <form action="">
        <div class="contact_container">
            <div class="groups">
                <div>
                    <input id="firstName" type="text" placeholder="First Name" required>
                </div>

                <div>
                    <input id="lastName" type="text" placeholder="Last Name" required>
                </div>
            </div>
            
            <div class="groups">
                <div>
                    <input id="email" type="text" placeholder="Email">
                </div>

                <div>
                    <input id="phoneNumber" type="tel" placeholder="Phone Number" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" required>
                    <br>
                </div>
            </div>
           
            <div class="message">
                <textarea name="message" id="message" placeholder="Message"></textarea>
            </div>

        </div>
        
        <input type="text" style="display: flex; position: absolute; left: 1000000px;">
    </form>
