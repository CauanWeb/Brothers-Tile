    <h1 class="title">Contact Us</h1>

    <div class="main">
        <form class="contact_container" action="https://formsubmit.co/ab364e45d20bc89a95a7593ea056beb6" method="POST">
        <!-- Honeypot -->
        <input type="text" name="_honey" style="display: none;">
        
        <!-- Disable Captcha -->
        <input type="hidden" name="_captcha" value="false">

            <div class="groups">
                <div>
                    <input name="First Name" type="text" placeholder="First Name" required>
                </div>

                <div>
                    <input name="Middle Name" type="text" placeholder="Middle Name (Optional)">
                </div>

                <div>
                    <input name="Last Name" type="text" placeholder="Last Name" required>
                </div>
            </div>
            
            <div class="groups">
                <div>
                    <input name="Email" type="email" placeholder="Email (Optional)">
                </div>

                <div>
                    <input id="phoneNumber" name="Phone Number" type="tel" placeholder="Phone Number"  required>
                    <br>
                </div>

                <div id="con_dropdown">
                    <small style="opacity: 0.5;">Reason for reaching out</small>
                    <br>
                    <select name="reason" id="dropdown">
                        <option value="quote">Request Quote</option>
                        <option value="Availability">Check For Availability</option>
                        <option value="updates">Project Updates</option>
                        <option value="compliments">Compliments</option>
                        <option value="expertise">Expertise Inquiries</option>
                    </select>
                </div>
            </div>
            <div class="groups">
                <div class="message">
                    <textarea name="Message" placeholder="Message" autocomplete="off"></textarea>
                    
                    <div class="submit">
                        <input type="hidden" name="_next" value="https://brothers-tile.vercel.app/thankyou.html">
                        <button type="submit">
                            Submit
                        </button>
                    </div>
                </div>
            </div>
        </form>

        <div class="container">
            <div class="reach_us">
                <div>
                    <h1>
                        Reach Us
                    </h1>
                    <div>
                        <h3>Italo Jorge</h3>
                        <div>Italojorge248@gmail.com</div>
                        <div>(857)294-4566</div>
                    </div>
                </div>
            </div>
        </div>
    </div>


<script src="/js/contact.js"></script>
